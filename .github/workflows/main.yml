
name: 24/7 Live Stream Bot

on:
  workflow_dispatch:
    inputs:
      use_proxy:
        description: 'Use Proxy (ON or OFF)'
        required: true
        type: choice
        options:
          - 'OFF'
          - 'ON'
        default: 'OFF'
  schedule:
    - cron: '0 */5 * * *'

# NAYA: Releases create karne ki ijazat deni hogi GitHub Actions ko
permissions:
  contents: write

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
    - name: Get Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install FFmpeg & Virtual Display (Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg xvfb

    - name: Install Required Packages
      # NAYA: puppeteer-screen-recorder install add kiya gaya hai
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth puppeteer-screen-recorder

    - name: Start Live Stream
      # NAYA: GitHub Token provide karna zaroori hai taakey node script GitHub Release upload kar sake
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USE_PROXY: ${{ github.event.inputs.use_proxy || 'OFF' }}
      run: xvfb-run --auto-servernum node browser.js

















































































